name: Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs: 
  build-and-test: 
    name: Build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check backend style and identation
        run: mvn spotless:check

      - name: Build and Run Tests
        run: mvn clean test

